### train_pose2rot_v11b_fkcal.yaml — v11 recipe with CALIBRATED + gentler FK ramp ###
# v11 ran fk_wt_end=10 (ramp 5->15) -> FK term was ~69% of total objective (~2.2x the whole
# rotation objective) at ep15-19, which over-dominated and degraded rotation accuracy uniformly
# across ALL tiers (angle_l1 ep15->ep19: seen 27.8->53.9, rare 33.6->57.0, unseen 31.9->55.3 deg;
# loss_rot 0.051->0.080, loss_root 0.099->0.123). Diagnosis (diag_fkcal_full.log, ep15 = end of v11 ramp):
#   rotation_objective(rot+vel+acc+tvar+root)=0.2080, loss_fk(unweighted, CORRECT fn)=0.04621.
# Calibration (target: weighted FK ~= 0.35 x rotation_objective, i.e. 35% of rot-objective / 26% of total):
#   fk_wt_end = 0.35 * (rotation_objective / loss_fk) = 0.35 * 0.2080 / 0.04621 = 1.575 -> 1.58.
# Ramp made gentler (10->30 instead of 5->15) so rotations settle further before FK refines offsets.
name: Pose2Rot training

runtime:
  device: cuda
  seed: 42
  debug: false

output:
  checkpoint_root: ./checkpoints/pose2rot


experiment:
  exp: exp_pose2rot_v11c_lr1e4_fkcal

model:
  target: models.v2.pose2rot.model.Pose2RotMemoryRestModel
  params:
    q_dim: 256
    rest_layers: 4
    pose_layers: 4
    memory_layers: 4
    decoder_layers: 10
    num_heads: 8
    joint_embed_dim: 768
    temporal_window: 2
    temporal_dropout: 0.1
    decoder_cond_mode: add # add | concat
    pose_rest_film: true
    memory_rest_film: true
    decoder_rest_film: true
    pose_use_graph: true
    use_grad_checkpoint: false
    decoder_use_cross_layers: 0   # MEMORY ABLATION: no decoder cross-attn into memory bank (kill species-constant leakage)

train:
  batch_size: 2   # DDP global batch = 2/gpu x 4 gpu = 8 (proven v10 dynamics on 4xA100; lr/warmup unchanged per codex: recipe is lr-fragile, do NOT linear-scale)
  epochs: 60
  grad_accum_steps: 1
  lr: 0.0001   # v11c: lr 2e-4 -> 1e-4. v11b diverged at ep8 (all-metrics 2x jump, fk_wt=0, grad-clipped) = optimizer instability; codex: constant 2e-4 too hot for fresh-data dynamics mid-training. Half LR is the root fix.
  warmup_steps: 1000   # 500 -> 1000 (codex: lengthen warmup; lr drop is the real fix)
  max_ckpt: 100
  num_workers_train: 6   # 6/proc x 2 proc = 12 of 16 cores
  test_every: 1
  pretrain_ckpt: null

  loss:
    rot_loss_type: smooth_l1
    vel_loss_type: smooth_l1
    acc_loss_type: smooth_l1

  weight:
    root_wt: 0.1
    fk_wt: 1.13   # CALIBRATED FK ramp END (v11 was 10.0 -> 69% of objective, over-dominated/degraded rotations).
                  # codex chose 1.13 (~25% of rotation_objective 0.2080, ~20% of total) over formula 1.58 (35%)
                  # for SAFETY on this first corrected run -- FK null-space corruption just burned a run, protect rotation supervision first.
    fk_wt_start: 0.0   # 从0起(纯抗塌缩早期, 让tvar正常破塌缩)
    fk_ramp_start_epoch: 15
    fk_ramp_end_epoch: 45    # v11c: delayed+gentler ramp 15->45 (codex; let rotations settle longer at lr1e-4 before FK enters), 之后恒1.13
    vel_wt: 1.0
    acc_wt: 1.0   # 用户要求加 acc(2阶时序平滑); 随机初始化量级~0.0095
    rot_wt: 1.0
    tvar_wt: 2.0   # demeaned-temporal supervision (force motion-tracking, anti-collapse)

  vis_every: 5
  weight_decay: 0.0

eval:
  batch_size: 1
  num_workers: 2

data:
  seq_len: 48
  bvh_dir: datasets/zoo1030_fresh_fbxrig/bvh
  image_embed_mode: dummy   # pose2rot is image-free: synthesize zeros[F,1,1] instead of loading on-disk npz['image_embed'] (avoids collate crash when a batch mixes real [F,257,1024] render embeds with [F,1,1] stubs). Future video2pose2rot leaves this unset to load real embeds.
  cache_scale: true
  limit_species_debug: []
  mmap: true
  split_json: datasets/zoo1030_fresh_fbxrig/test_split_seen_rare_unseen.json
  train_memory_pkl_path: datasets/zoo1030_fresh_fbxrig/cache/species_fps_memory_yAll/fps_select_by_rot_32.pkl
  test_memory_pkl_path: datasets/zoo1030_fresh_fbxrig/cache/species_fps_memory_yAll/fps_select_by_rot_32.pkl
